<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>System Access</title>

<style>
body{
margin:0;
background:#000;
overflow:hidden;
font-family:monospace;
color:#00ff00;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#bg{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle,#003300 0%,#000000 70%);
opacity:.6;
z-index:-1;
}

#container{
text-align:center;
}

h1{
font-size:30px;
letter-spacing:3px;
}

#progress{
font-size:50px;
margin-top:20px;
}

#unlock{
display:none;
font-size:45px;
animation:pulse 1s infinite;
}

iframe{
display:none;
width:100vw;
height:100vh;
border:none;
}

@keyframes pulse{
0%{opacity:0.2;}
50%{opacity:1;}
100%{opacity:0.2;}
}
</style>

</head>

<body>

<div id="bg"></div>

<div id="container">

<h1>SYSTEM BREACH DETECTED</h1>

<div id="progress">0%</div>

<div id="unlock">
UNLOCKING PHONE...
</div>

</div>

<iframe
id="video"
allow="autoplay"
allowfullscreen>
</iframe>

<script>

let p = 0;

let timer = setInterval(() => {

p++;

document.getElementById("progress").innerHTML = p + "%";

if(p >= 100){

clearInterval(timer);

document.getElementById("progress").style.display="none";

document.getElementById("unlock").style.display="block";

setTimeout(() => {

document.getElementById("container").style.display="none";

let vid = document.getElementById("video");

vid.style.display="block";

vid.src="https://www.youtube.com/embed/K8FjE1v16GY?autoplay=1";

},3000);

}

},50);

</script>

</body>
</html>
