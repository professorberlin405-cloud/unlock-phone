<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Unlocking...</title>

<style>
body{
background:black;
color:#00ff00;
font-family:monospace;
text-align:center;
padding-top:100px;
}

#video{
display:none;
width:100%;
height:100vh;
border:none;
}

#loading{
font-size:24px;
}
</style>
</head>

<body>

<div id="loading">
<h1>CONNECTING TO DEVICE...</h1>
<p id="progress">0%</p>
</div>

<iframe
id="video"
allow="autoplay"
allowfullscreen>
</iframe>

<script>

let p = 0;

let timer = setInterval(() => {

p += 5;

document.getElementById("progress").innerHTML =
"UNLOCKING... " + p + "%";

if(p >= 100){

clearInterval(timer);

document.getElementById("loading").style.display="none";

document.getElementById("video").style.display="block";

document.getElementById("video").src =
"https://www.youtube.com/watch?v=K8FjE1v16GY";

}

},150);

</script>

</body>
</html>
